<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Codziennych Wyzwań</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>

<div class="kontener">
    <h1>Generator Codziennych Wyzwań</h1>

    <button id="generuj">Wylosuj wyzwanie!</button>

    <div id="wyzwanie" class="ukryty">
        <p id="wyzwanie_tekst"></p>
        <button id="zrobione">Zrobione</button>
    </div> <br>

    <button id="pokaz_historie" class="">Pokaż historię</button>
    

    <div id="historia" class="ukryty">
        <h3>Historia wyzwan:</h3>
        <ul id="lista_histori"></ul>
    </div> <br>

    <button id="reset" class="">Resetuj</button>


    <div>
            <label for="liczba_w">Liczba Wyzwań:</label>
            <span id="liczba_w"></span>
            <br>

            <label for="liczba_z">Liczba Zrobionych Wyzwań:</label>
            <span id="liczba_z"></span>

    </div>

</div>

<div class="stopka">
    <hr>
    
    <div class="info">
        <img src="l1.jpg" alt="logo">

        <h4>Autor: Szymon Łapiński</h4>
        <a href="regulamin.txt">Terms of use</a>

    </div>
</div>
<script src="skrypt.js"></script>


</body>
</html>
